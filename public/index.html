<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pica — Dashboard</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <main class="container">
    <section class="dashboard-welcome">
      <h1>Welcome to <span id="company-name">Pica</span></h1>
      <p class="muted">
        Signed in as <strong id="current-user">…</strong>.
        Use the top menu to navigate.
      </p>
    </section>

    <section class="card dashboard-placeholder">
      <h2>Dashboard</h2>
      <p class="subtle">
        This space will be filled with at-a-glance widgets in a future
        milestone — today's punches, pending leaves, upcoming time-off, and
        company KPIs. For now, pick a section from the top menu.
      </p>
    </section>
  </main>

  <script type="module" src="/index.js"></script>
</body>
</html>
