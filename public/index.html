<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.dashboard">Pica — Dashboard</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <main class="container container--wide">
    <section class="dashboard-welcome">
      <h1 id="welcome">…</h1>
      <p class="muted" id="signed-in-line">…</p>
    </section>

    <!-- Widgets — populated by index.js based on role. The grid layout
         comes from index.css; on mobile each widget stacks full-width,
         on desktop they flow into a 2-column grid with one widget
         spanning both columns. -->
    <div id="widget-grid" class="widget-grid"></div>

    <nav id="nav-cards" class="nav-cards" aria-label="Quick navigation">
      <!-- filled in JS based on role -->
    </nav>
  </main>

  <script type="module" src="/index.js"></script>
</body>
</html>
