<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title>Pica — Dashboard</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <main class="container container--wide">
    <section class="dashboard-welcome">
      <h1>Welcome to <span id="company-name">Pica</span></h1>
      <p class="muted">
        Signed in as <strong id="current-user">…</strong>.
        Use the top menu to navigate.
      </p>
    </section>

    <nav id="nav-cards" class="nav-cards" aria-label="Quick navigation">
      <!-- filled in JS based on role -->
    </nav>

    <section class="card dashboard-placeholder">
      <h2>Dashboard</h2>
      <p class="subtle">
        This space will be filled with at-a-glance widgets in a future
        milestone — today's punches, pending leaves, upcoming time-off, and
        company KPIs. For now, pick a section from the top menu.
      </p>
    </section>
  </main>

  <script type="module" src="/index.js"></script>
</body>
</html>
