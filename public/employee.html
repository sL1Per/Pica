<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    // Defaults (no stored pref): slate palette, light mode.
    try {
      var root = document.documentElement;
      root.setAttribute('data-palette', 'slate'); // default; overridden below
      var m = localStorage.getItem('pica-color-mode') || 'light';
      var dark = m === 'dark' || (m === 'system' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette') || 'slate';
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default slate light */ }
  </script>
  <title data-i18n="title.employeeSummary">Pica — Employee</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/modal.css">
  <link rel="stylesheet" href="/employee.css">
  <link rel="stylesheet" href="/leave-detail-modal.css">
</head>
<body>
  <main class="container container--wide">
    <a class="ed-back" id="back-link" href="/employees" data-i18n="employee.summary.back">← Back to team</a>

    <div id="message" class="message"></div>
    <p id="error" class="ed-error" hidden></p>

    <!-- Hero, 3-up stats, and the lower cards are all built by employee.js. -->
    <section id="ed-hero" class="ed-hero" hidden></section>

    <div id="ed-stats" class="ed-stats" hidden></div>

    <div class="ed-grid" id="ed-grid" hidden>
      <div class="ed-col">
        <section class="ed-card">
          <h2 class="ed-card__title" data-i18n="employee.detail.recentTitle">Recent days</h2>
          <div id="ed-recent-body"></div>
        </section>
      </div>
      <div class="ed-col">
        <section class="ed-card">
          <h2 class="ed-card__title" id="ed-pending-title" data-i18n="employee.summary.pendingDetailTitle">Awaiting your decision</h2>
          <div id="ed-pending-body"></div>
        </section>
        <section class="ed-card">
          <h2 class="ed-card__title" data-i18n="employee.summary.upcomingTitle">Upcoming leaves</h2>
          <div id="ed-upcoming-body"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/employee.js"></script>
  </main>
</body>
</html>
