<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.correctionDetail">Pica — Correction</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/corrections.css">
  <link rel="stylesheet" href="/correction.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <a id="back-link" class="cdet-back" href="/corrections" data-i18n="correction.backToList">← Back to corrections</a>
        <h1 id="page-title" data-i18n="correction.title">Correction</h1>
      </div>
    </header>

    <div id="message" class="message"></div>

    <div class="cdet-page">

      <!-- Status hero: modifier class (.cdet-hero--pending/approved/rejected/cancelled)
           + icon glyph + label + blurb are all set by render() in correction.js. -->
      <div id="cdet-hero" class="cdet-hero">
        <div id="cdet-hero-icon" class="cdet-hero__icon" aria-hidden="true"></div>
        <div class="cdet-hero__body">
          <p id="cdet-hero-label" class="cdet-hero__label"></p>
          <p id="cdet-hero-blurb" class="cdet-hero__blurb"></p>
        </div>
      </div>

      <!-- Details card: Employee, When (start/end/hours), Filed, Decision -->
      <div class="cdet-card">
        <h2 class="cdet-card__title" data-i18n="correction.cardDetails">Details</h2>
        <dl class="cdet-dl">

          <dt data-i18n="correction.fieldEmployee">Employee</dt>
          <dd id="f-employee">—</dd>

          <dt data-row="start" data-i18n="correction.fieldStart">Start</dt>
          <dd id="f-start" class="cdet-mono">—</dd>

          <dt data-row="end" data-i18n="correction.fieldEnd">End</dt>
          <dd id="f-end" class="cdet-mono">—</dd>

          <dt data-row="hours" data-i18n="correction.fieldDuration">Duration</dt>
          <dd id="f-hours" class="cdet-mono">—</dd>

          <dt data-i18n="correction.fieldFiled">Filed</dt>
          <dd id="f-created" class="cdet-mono">—</dd>

          <dt id="dt-decided" hidden data-i18n="correction.fieldDecision">Decision</dt>
          <dd id="f-decided" class="cdet-mono" hidden>—</dd>

        </dl>
      </div>

      <!-- Reason / Justification card -->
      <div class="cdet-card">
        <h2 class="cdet-card__title" data-i18n="correction.fieldJustification">Justification</h2>
        <p id="f-justification">—</p>

        <!-- Notes row: only revealed after a rejection decision -->
        <h3 id="dt-notes" class="cdet-card__title" hidden data-i18n="correction.fieldNotes">Notes</h3>
        <p id="f-notes" hidden>—</p>
      </div>

      <!-- f-status: preserved for JS that sets textContent + className; kept hidden in the card layout -->
      <span id="f-status" class="status-tag" hidden>—</span>

      <!-- Actions card: wrapper shown/hidden by renderActions() -->
      <div id="actions-card" class="cdet-card" hidden>
        <h2 class="cdet-card__title" data-i18n="correction.cardActions">Actions</h2>
        <div id="actions" class="cdet-actions"></div>
      </div>

    </div>

    <dialog id="reject-dialog" class="reject-dialog">
      <form method="dialog">
        <h3 data-i18n="correction.rejectTitle">Reject correction</h3>
        <label for="reject-notes" data-i18n="correction.rejectNotes">Notes (optional)</label>
        <textarea id="reject-notes" rows="3" maxlength="500" data-i18n-attr="placeholder:correction.rejectPlaceholder" placeholder="Reason for rejection"></textarea>
        <div class="form-actions">
          <button id="reject-cancel" type="button" class="btn-ghost" data-i18n="correctionNew.cancel">Cancel</button>
          <button id="reject-confirm" type="button" class="btn-danger" data-i18n="correction.actionReject">Reject</button>
        </div>
      </form>
    </dialog>
  </main>

  <script type="module" src="/correction.js"></script>
</body>
</html>
