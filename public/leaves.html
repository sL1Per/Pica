<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.leaves">Pica — Leaves</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/leaves.css">
  <link rel="stylesheet" href="/modal.css">
  <link rel="stylesheet" href="/request-leave-modal.css">
</head>
<body>
  <main class="container container--wide">
    <div class="lv-page">

      <header class="lv-head">
        <div>
          <h1 class="lv-head__title" data-i18n="leaves.title">Leaves</h1>
          <p class="lv-head__sub" id="page-sub"></p>
        </div>
        <div class="lv-actions">
          <a href="/leaves/calendar" class="lv-btn lv-btn--ghost" data-i18n="leaves.viewCalendar">View calendar</a>
          <button type="button" id="request-btn" class="lv-btn" data-i18n="leaves.requestNew">+ Request leave</button>
        </div>
      </header>

      <div id="message" class="message"></div>

      <!-- ===================================================== Employee region -->
      <div id="emp-region" hidden>
        <section class="lv-card" aria-labelledby="emp-balance-heading">
          <div class="lv-card__head">
            <h2 id="emp-balance-heading" class="lv-card__title" data-i18n="leaves.yourBalance">Your balance</h2>
          </div>
          <div id="balance-blocks" class="lv-bal"></div>
          <p class="subtle lv-bal__meta" data-i18n="leaves.balanceNote">Rejected and cancelled leaves are excluded.</p>
        </section>

        <section class="lv-card" aria-labelledby="emp-history-heading">
          <div class="lv-card__head">
            <h2 id="emp-history-heading" class="lv-card__title" data-i18n="leaves.yourHistory">Your history</h2>
          </div>
          <div class="lv-filter" id="filter-bar" role="tablist"></div>
          <ul id="leave-list" class="lv-list">
            <li class="lv-empty" data-i18n="leaves.loading">Loading…</li>
          </ul>
        </section>
      </div>

      <!-- ===================================================== Employer region -->
      <div id="empr-region" hidden>
        <section class="lv-card lv-card--pending" aria-labelledby="empr-pending-heading">
          <div class="lv-card__head">
            <h2 id="empr-pending-heading" class="lv-card__title">
              <span data-i18n="leaves.pendingApproval">Pending approval</span>
              <span id="pending-tag" class="lv-card__tag" hidden></span>
            </h2>
          </div>
          <ul id="pending-list" class="lv-list"></ul>
        </section>

        <section class="lv-card" aria-labelledby="empr-balance-heading">
          <div class="lv-card__head">
            <h2 id="empr-balance-heading" class="lv-card__title" data-i18n="leaves.teamBalance">Team balance</h2>
            <label class="lv-year">
              <span class="sr-only" data-i18n="leaves.year">Year</span>
              <select id="year-select" class="form-control"></select>
            </label>
          </div>
          <div class="lv-matrix__wrap">
            <table id="balance-matrix" class="lv-matrix">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="lv-card" aria-labelledby="empr-all-heading">
          <div class="lv-card__head">
            <h2 id="empr-all-heading" class="lv-card__title" data-i18n="leaves.allRequests">All requests</h2>
          </div>
          <div class="lv-filter" id="filter-bar-empr" role="tablist"></div>
          <ul id="leave-list-empr" class="lv-list"></ul>
        </section>
      </div>

    </div>
  </main>

  <script type="module" src="/leaves.js"></script>
</body>
</html>
