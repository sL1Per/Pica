<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.login">Pica — Sign in</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="container">
    <h1>Pica <span class="tagline" data-i18n="login.title">Sign in</span></h1>

    <form id="login-form" class="card" autocomplete="on" novalidate>
      <label for="username" data-i18n="login.username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             autofocus inputmode="text">

      <label for="password" data-i18n="login.password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <button id="submit-btn" type="submit" class="block" data-i18n="login.submit">Sign in</button>

      <div id="message" class="message"></div>
    </form>
  </main>

  <script type="module" src="/login.js"></script>
</body>
</html>
