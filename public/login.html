<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title>Pica — Sign in</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="container">
    <h1>Pica <span class="tagline">Sign in</span></h1>

    <form id="login-form" class="card" autocomplete="on" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             autofocus inputmode="text">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <button id="submit-btn" type="submit" class="block">Sign in</button>

      <div id="message" class="message"></div>
    </form>
  </main>

  <script type="module" src="/login.js"></script>
</body>
</html>
