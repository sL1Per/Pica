<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.punchesToday">Pica — Today</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/punch.css">
  <link rel="stylesheet" href="/punches-today.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 data-i18n="punchesToday.title">Today</h1>
        <p class="muted"><a href="/punch" data-i18n="punchesToday.myClock">My clock →</a></p>
      </div>
    </header>

    <!-- Sub-tab strip: Today is the current panel; Corrections navigates -->
    <nav class="punch-tabs" aria-label="Punch views">
      <button type="button" class="punch-tab punch-tab--active" data-i18n="punchesToday.tabToday">Today</button>
      <a class="punch-tab" href="/corrections" data-i18n="punchesToday.tabCorrections">Corrections</a>
    </nav>

    <div id="message" class="message"></div>

    <div id="groups" class="ptoday">
      <p class="subtle" data-i18n="punchesToday.loading">Loading…</p>
    </div>
  </main>

  <script type="module" src="/punches-today.js"></script>
</body>
</html>
