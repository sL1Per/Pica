<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title data-i18n="title.employeeDetail">Pica — Employee</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/employee-profile.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 id="page-title" data-i18n="employee.profile">Profile</h1>
        <p class="muted"><a id="back-link" href="/" data-i18n="employee.back">← Back</a></p>
      </div>
    </header>

    <div id="message" class="message"></div>

    <div class="card">
      <div class="avatar-block">
        <div id="avatar" class="avatar">?</div>
        <div class="avatar-actions">
          <input type="file" id="picture-input" accept="image/*" hidden>
          <button id="upload-btn" type="button" class="secondary" data-i18n="employee.uploadPicture">Upload picture</button>
          <button id="remove-pic-btn" type="button" class="secondary" hidden data-i18n="employee.remove">Remove</button>
          <p class="subtle" data-i18n="employee.maxPictureHint">Max 400×400, resized in your browser.</p>
        </div>
      </div>

      <form id="profile-form" autocomplete="off" novalidate>
        <label data-i18n="employee.fieldUsername">Username</label>
        <div id="username-display" class="readonly-field">—</div>

        <label data-i18n="employee.fieldRole">Role</label>
        <div id="role-display" class="readonly-field">—</div>

        <label for="fullName" data-i18n="employee.fieldFullName">Full name</label>
        <input type="text" id="fullName" name="fullName">

        <label for="dateOfBirth" data-i18n="employee.fieldDob">Date of birth</label>
        <div class="dob-row">
          <input type="date" id="dateOfBirth" name="dateOfBirth">
          <span id="age-display" class="dob-age muted" hidden></span>
        </div>

        <label for="position"><span data-i18n="employee.fieldPosition">Position</span> <span id="position-hint" class="subtle" hidden data-i18n="employee.employerSet">(employer-set)</span></label>
        <input type="text" id="position" name="position">

        <label for="contactEmail" data-i18n="employeeNew.contactEmail">Contact email</label>
        <input type="email" id="contactEmail" name="contactEmail">

        <label for="contactPhone" data-i18n="employeeNew.contactPhone">Contact phone</label>
        <input type="text" id="contactPhone" name="contactPhone">

        <label for="address" data-i18n="employeeNew.address">Address</label>
        <input type="text" id="address" name="address">

        <label for="comments"><span data-i18n="employeeNew.comments">Comments</span> <span id="comments-hint" class="subtle" hidden data-i18n="employee.employerSet">(employer-set)</span></label>
        <textarea id="comments" name="comments" rows="3"></textarea>

        <button id="save-btn" type="submit" class="block" data-i18n="employee.savePic">Save profile</button>
      </form>

      <div id="danger-zone" class="danger-zone" hidden>
        <h3 data-i18n="employee.dangerZone">Danger zone</h3>
        <button id="delete-btn" type="button" data-i18n="employee.delete">Delete employee</button>
        <p class="subtle" data-i18n="employee.deleteHint">This removes the user account, profile, and picture. Not reversible.</p>
      </div>
    </div>
  </main>

  <script type="module" src="/employee-profile.js"></script>
</body>
</html>
