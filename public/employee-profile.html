<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.employeeDetail">Pica — Employee</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/employee-profile.css">
</head>
<body>
  <main class="container">
    <a id="back-link" class="prof-back" href="/" data-i18n="employee.back">← Back</a>

    <div class="prof-head">
      <h1 id="page-title" data-i18n="employee.profile">Profile</h1>
    </div>

    <div id="message" class="message"></div>

    <form id="profile-form" autocomplete="off" novalidate>
      <!-- Identity -->
      <div class="prof-card">
        <h2 data-i18n="employee.cardIdentity">Identity</h2>
        <div class="avatar-block">
          <div id="avatar" class="prof-avatar">?</div>
          <div class="avatar-actions">
            <input type="file" id="picture-input" accept="image/*" hidden>
            <button id="upload-btn" type="button" class="prof-btn-sec" data-i18n="employee.uploadPicture">Upload picture</button>
            <button id="remove-pic-btn" type="button" class="prof-btn-sec" hidden data-i18n="employee.remove">Remove</button>
            <p class="subtle" data-i18n="employee.maxPictureHint">Max 400×400, resized in your browser.</p>
          </div>
        </div>

        <div class="prof-field">
          <label data-i18n="employee.fieldUsername">Username</label>
          <div id="username-display" class="readonly-field">—</div>
        </div>
        <div class="prof-field">
          <label for="fullName" data-i18n="employee.fieldFullName">Full name</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>
        <div class="prof-field">
          <label for="dateOfBirth" data-i18n="employee.fieldDob">Date of birth</label>
          <div class="dob-row">
            <input type="date" id="dateOfBirth" name="dateOfBirth" required>
            <span id="age-display" class="dob-age" hidden></span>
          </div>
        </div>
        <div class="prof-field">
          <label for="address" data-i18n="employeeNew.address">Address</label>
          <input type="text" id="address" name="address" required>
        </div>
      </div>

      <!-- Role -->
      <div class="prof-card">
        <h2 data-i18n="employee.cardRole">Role</h2>
        <div class="prof-field">
          <label data-i18n="employee.fieldRole">Role</label>
          <div><span id="role-display" class="role-badge">—</span></div>
        </div>
        <div class="prof-field">
          <label for="position"><span data-i18n="employee.fieldPosition">Position</span> <span id="position-hint" class="subtle" hidden data-i18n="employee.employerSet">(employer-set)</span></label>
          <input type="text" id="position" name="position" required>
        </div>
      </div>

      <!-- Contact -->
      <div class="prof-card">
        <h2 data-i18n="employee.cardContact">Contact</h2>
        <div class="prof-field">
          <label for="contactEmail" data-i18n="employeeNew.contactEmail">Contact email</label>
          <input type="email" id="contactEmail" name="contactEmail" required>
        </div>
        <div class="prof-field">
          <label for="contactPhone" data-i18n="employeeNew.contactPhone">Contact phone</label>
          <input type="text" id="contactPhone" name="contactPhone" required>
        </div>
      </div>

      <!-- Internal notes -->
      <div class="prof-card">
        <h2><span data-i18n="employee.cardNotes">Internal notes</span> <span id="comments-hint" class="subtle" hidden data-i18n="employee.employerSet">(employer-set)</span></h2>
        <div class="prof-field">
          <textarea id="comments" name="comments" rows="3"></textarea>
        </div>
      </div>

      <button id="save-btn" type="submit" class="prof-btn" data-i18n="employee.savePic">Save profile</button>
    </form>

    <div id="danger-zone" class="danger-zone" hidden>
      <h3 data-i18n="employee.dangerZone">Danger zone</h3>
      <button id="delete-btn" type="button" data-i18n="employee.delete">Delete employee</button>
      <p class="subtle" data-i18n="employee.deleteHint">This removes the user account, profile, and picture. Not reversible.</p>
    </div>
  </main>

  <script type="module" src="/employee-profile.js"></script>
</body>
</html>
