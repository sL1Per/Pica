<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pica">
  <!-- Full-bleed background so the icon looks correct under any OS mask shape. -->
  <rect width="512" height="512" rx="96" fill="#2e7d32"/>
  <!-- "P" mark, centered inside the 80% maskable safe zone (52..460). -->
  <g fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700">
    <text x="256" y="356" font-size="320" text-anchor="middle">P</text>
  </g>
</svg>
