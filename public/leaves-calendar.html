<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.leavesCalendar">Pica — Leaves calendar</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/leaves-calendar.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 data-i18n="calendar.title">Leaves calendar</h1>
        <p class="muted">
          <a href="/leaves" data-i18n="calendar.myLeaves">← My leaves</a>
          · <span class="subtle" data-i18n="calendar.approvedOnly">Approved leaves only</span>
        </p>
      </div>
      <a href="/leaves/new" class="btn-link" data-i18n="calendar.requestNew">+ Request leave</a>
    </header>

    <div id="message" class="message"></div>

    <nav class="cal-nav">
      <button id="prev-month" class="secondary" type="button">←</button>
      <h2 id="cal-title">…</h2>
      <button id="next-month" class="secondary" type="button">→</button>
      <button id="today-btn" class="secondary" type="button" data-i18n="calendar.today">Today</button>
    </nav>

    <div class="cal-grid" id="cal-grid">
      <!-- 7 weekday headers + 42 day cells injected by JS -->
    </div>

    <!-- Tap-to-expand day-details panel. Hidden until a day is selected.
         On mobile this is the primary read surface; on desktop it
         supplements the in-cell bars. -->
    <section id="cal-details" class="cal-details" hidden aria-live="polite">
      <header class="cal-details__head">
        <h3 id="cal-details-title" class="cal-details__title">…</h3>
        <button id="cal-details-close" type="button" class="cal-details__close"
                aria-label="Close" data-i18n-attr="aria-label:calendar.detailsClose">×</button>
      </header>
      <ul id="cal-details-list" class="cal-details__list"></ul>
    </section>

    <section class="legend">
      <strong data-i18n="calendar.legendType">Type</strong>
      <span class="legend__chip legend__chip--vacation" data-i18n="leaves.type.vacation">Vacation</span>
      <span class="legend__chip legend__chip--sick" data-i18n="leaves.type.sick">Sick</span>
      <span class="legend__chip legend__chip--appointment" data-i18n="leaves.type.appointment">Appointment</span>
      <span class="legend__chip legend__chip--other" data-i18n="leaves.type.other">Other</span>
      <span class="legend__chip legend__chip--blocked" data-i18n="calendar.blocked">Blocked</span>
    </section>
  </main>

  <script type="module" src="/leaves-calendar.js"></script>
</body>
</html>
