<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.leavesCalendar">Pica — Leaves calendar</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/leaves-calendar.css">
  <link rel="stylesheet" href="/modal.css">
  <link rel="stylesheet" href="/request-leave-modal.css">
  <link rel="stylesheet" href="/leave-detail-modal.css">
</head>
<body>
  <main class="container container--wide">
    <div id="message" class="message"></div>

    <div class="cal-page">
      <header class="cal-head">
        <h1 class="cal-head__title" data-i18n="calendar.title">Calendar</h1>
        <p class="cal-head__sub" id="cal-sub"></p>
      </header>

      <div class="cal-main">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <button id="prev-month" type="button" class="cal-nav__btn" aria-label="Previous month">←</button>
            <h2 id="cal-month" class="cal-month">…</h2>
            <button id="next-month" type="button" class="cal-nav__btn" aria-label="Next month">→</button>
            <button id="today-btn" type="button" class="cal-today" data-i18n="calendar.today">Today</button>
          </div>
          <div id="cal-chips" class="cal-chips"></div>
        </div>

        <div class="cal-weekhead" id="cal-weekhead"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <aside class="cal-rail">
        <section class="cal-rail__card" id="rail-role"></section>
        <section class="cal-rail__card">
          <h3 class="cal-rail__title" data-i18n="calendar.outToday">Out today</h3>
          <div id="rail-out-today"></div>
        </section>
        <section class="cal-rail__card">
          <h3 class="cal-rail__title" data-i18n="calendar.outTomorrow">Out tomorrow</h3>
          <div id="rail-out-tomorrow"></div>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="/leaves-calendar.js"></script>
</body>
</html>
