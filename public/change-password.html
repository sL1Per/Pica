<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.changePassword">Pica — Change password</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
</head>
<body>
  <main class="container">
    <h1 data-i18n="changePassword.heading">Change password</h1>

    <!-- Forced-change banner — only shown when ?required or when mustChangePassword=true.
         JS unhides it. -->
    <div id="forced-banner" class="message message--error" hidden>
      <strong data-i18n="changePassword.forcedTitle">Password change required</strong>
      <p data-i18n="changePassword.forcedBody">An administrator has reset your password. Choose a new password to continue using Pica.</p>
    </div>

    <div id="message" class="message"></div>

    <form id="change-form" autocomplete="off">
      <label for="current-password" data-i18n="changePassword.current">Current password</label>
      <input type="password" id="current-password" autocomplete="current-password" required>

      <label for="new-password" data-i18n="changePassword.new">New password</label>
      <input type="password" id="new-password" autocomplete="new-password" minlength="8" required>

      <label for="new-password-confirm" data-i18n="changePassword.confirm">Confirm new password</label>
      <input type="password" id="new-password-confirm" autocomplete="new-password" minlength="8" required>

      <p class="muted" data-i18n="changePassword.requirements">Password must be at least 8 characters.</p>

      <div class="btn-row">
        <button type="submit" id="submit-btn" data-i18n="changePassword.submit">Change password</button>
        <a id="cancel-link" href="/" class="muted" data-i18n="changePassword.cancel">Cancel</a>
      </div>
    </form>
  </main>
  <script type="module" src="/change-password.js"></script>
</body>
</html>
