<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title data-i18n="title.punch">Pica — Clock</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/punch.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 data-i18n="punch.heading">Clock</h1>
      </div>
    </header>

    <div class="punch-layout">

      <section class="punch-card">
      <div id="status-block" class="status-block status-block--unknown">
        <div class="status-dot"></div>
        <div>
          <div id="status-label" class="status-label" data-i18n="punch.checking">Checking…</div>
          <div id="status-meta" class="status-meta"></div>
        </div>
      </div>

      <!-- Two-button row: only one is clickable at a time, the other is
           visually present but disabled. -->
      <div class="punch-buttons">
        <button id="clock-in-btn"  type="button" class="punch-btn punch-btn--in"  disabled data-i18n="punch.clockIn">Clock in</button>
        <button id="clock-out-btn" type="button" class="punch-btn punch-btn--out" disabled data-i18n="punch.clockOut">Clock out</button>
      </div>

      <p id="queue-badge" class="queue-badge" hidden></p>

      <label for="comment" data-i18n="punch.commentLabelOptional">Comment (optional)</label>
      <textarea id="comment" rows="2" maxlength="500"
                data-i18n-attr="placeholder:punch.commentPh"
                placeholder="e.g. Starting afternoon shift"></textarea>

      <!-- Map placeholder. Hidden until first geolocation success.
           Location sharing is mandatory; if the browser refuses or
           times out, the punch still goes through (logged as such). -->
      <div id="map-card" class="map-card" hidden>
        <div class="map-card__frame">
          <img id="map-tile" class="map-card__tile" alt="" decoding="async">
          <div class="map-card__pin" aria-hidden="true">📍</div>
        </div>
        <div id="map-meta" class="map-card__meta"></div>
        <p class="map-card__attrib">
          <span data-i18n="punch.mapData">Map data</span>
          <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap contributors</a>
        </p>
      </div>

      <p id="geo-status" class="subtle"></p>
      <button id="retry-geo-btn" type="button" class="btn-ghost btn-sm" hidden data-i18n="punch.geoRetry">Retry location</button>

      <div id="message" class="message"></div>
    </section>

    <section class="today-section">
      <div class="today-section__head">
        <h2 data-i18n="punch.title">Today</h2>
        <span id="today-total" class="today-total" hidden></span>
      </div>
      <ul id="today-list" class="punch-list">
        <li class="subtle" data-i18n="punch.loading">Loading…</li>
      </ul>

      <div class="today-section__foot">
        <p id="bank-line" class="bank-line" hidden>
          <span class="bank-line__label" data-i18n="punch.bankLabel">Time bank:</span>
          <span id="bank-line__value" class="bank-line__value">—</span>
        </p>
        <p class="forgot-line">
          <a href="/corrections" class="forgot-link" data-i18n="punch.viewCorrections">View corrections list →</a>
        </p>
        <p class="forgot-line">
          <a href="/corrections/new" class="forgot-link" data-i18n="punch.forgotToClock">Forgot to clock? Register manual time →</a>
        </p>
      </div>
      </section>

      <p class="subtle center" style="margin-top: var(--gap-3);">
        <a href="/punches/today" id="all-today-link" hidden data-i18n="punch.seeAllToday">See everyone’s punches today →</a>
      </p>

    </div>
  </main>

  <script type="module" src="/punch.js"></script>
</body>
</html>
