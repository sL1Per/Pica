<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.punch">Pica — Clock</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/punch.css">
  <link rel="stylesheet" href="/modal.css">
  <link rel="stylesheet" href="/manual-time-modal.css">
</head>
<body>
  <main class="container container--wide">
    <header class="punch-head">
      <div>
        <h1 class="punch-head__title" data-i18n="punch.heading">Clock</h1>
        <div class="punch-head__sub" id="punch-sub"></div>
      </div>
      <a class="punch-forgot" href="/corrections/new" data-i18n="punch.forgotShort">+ Forgot to clock?</a>
    </header>

    <!-- Clock hero — paintStatus() fills status + readout; doPunch() on buttons -->
    <section class="clock-hero" id="status-block">
      <div class="clock-hero__accent" aria-hidden="true"></div>
      <div class="clock-hero__body">
        <span class="clock-status" id="clock-status">
          <span class="clock-status__dot"></span>
          <span id="status-label" data-i18n="punch.checking">Checking…</span>
        </span>
        <div class="clock-big mono" id="clock-big">—</div>
        <div class="clock-sub" id="status-meta"></div>
        <div class="clock-loc" id="map-meta-line" hidden>
          <span class="clock-loc__pin" aria-hidden="true"></span>
          <span id="clock-loc-text"></span>
        </div>
      </div>

      <div class="punch-actions">
        <button id="clock-in-btn"  type="button" class="punch-btn punch-btn--in"  disabled data-i18n="punch.clockIn">Check in</button>
        <button id="clock-out-btn" type="button" class="punch-btn punch-btn--out" disabled data-i18n="punch.clockOut">Check out</button>
      </div>

      <p id="queue-badge" class="queue-badge" hidden></p>

      <label for="comment" class="punch-comment__label" data-i18n="punch.commentLabelOptional">Comment (optional)</label>
      <textarea id="comment" class="punch-comment" rows="2" maxlength="500"
                data-i18n-attr="placeholder:punch.commentPh" placeholder="e.g. Starting afternoon shift"></textarea>

      <!-- OSM map preview — preserved; renderMap()/hideMap() drive it -->
      <div id="map-card" class="map-card" hidden>
        <div class="map-card__frame">
          <img id="map-tile" class="map-card__tile" alt="" decoding="async">
          <div class="map-card__pin" aria-hidden="true">📍</div>
        </div>
        <div id="map-meta" class="map-card__meta"></div>
        <p class="map-card__attrib">
          <span data-i18n="punch.mapData">Map data</span>
          <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap contributors</a>
        </p>
      </div>
      <p id="geo-status" class="geo-status subtle"></p>
      <button id="retry-geo-btn" type="button" class="btn-ghost btn-sm" hidden data-i18n="punch.geoRetry">Retry location</button>
      <div id="message" class="message"></div>
    </section>

    <!-- Sub-tab strip: Today/This-week are panels here; My corrections is a route -->
    <nav class="punch-tabs" aria-label="Punch views">
      <button type="button" class="punch-tab punch-tab--active" id="tab-today"  data-i18n="punch.tabToday">Today</button>
      <button type="button" class="punch-tab"                   id="tab-week"   data-i18n="punch.tabWeek">This week</button>
      <a class="punch-tab" href="/corrections" data-i18n="punch.tabCorrections">My corrections</a>
    </nav>

    <section id="panel-today">
      <div class="today-section__head">
        <h2 class="sr-only" data-i18n="punch.title">Today</h2>
        <span id="today-total" class="today-total" hidden></span>
      </div>
      <ul id="today-list" class="punch-list"><li class="subtle" data-i18n="punch.loading">Loading…</li></ul>
      <a class="punch-reminder" href="/corrections/new">
        <span class="punch-reminder__icon" aria-hidden="true">+</span>
        <span class="punch-reminder__text">
          <span class="punch-reminder__title" data-i18n="punch.reminderTitle">Missing a punch?</span>
          <span class="punch-reminder__sub" data-i18n="punch.reminderSub">Send a manual time entry to your manager.</span>
        </span>
      </a>
    </section>

    <section id="panel-week" hidden>
      <ul id="week-list" class="punch-list"><li class="subtle" data-i18n="punch.loading">Loading…</li></ul>
    </section>

    <p class="subtle center mt-3">
      <a href="/punches/today" id="all-today-link" hidden data-i18n="punch.seeAllToday">See everyone’s punches today →</a>
    </p>
  </main>

  <script type="module" src="/punch.js"></script>
</body>
</html>
