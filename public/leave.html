<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.leaveDetail">Pica — Leave</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/leave.css">
</head>
<body>
  <main class="container container--wide">
    <a href="/leaves" class="ldet-back" data-i18n="leave.backToLeaves">← Back to leaves</a>

    <div id="message" class="message"></div>

    <div id="detail" class="ldet-grid" hidden>
      <div class="ldet-main">

        <!-- Status hero -->
        <div id="status-hero" class="ldet-hero">
          <div id="hero-icon" class="ldet-hero__icon"></div>
          <div class="ldet-hero__body">
            <h1 id="hero-label" class="ldet-hero__label"></h1>
            <p id="hero-blurb" class="ldet-hero__blurb"></p>
          </div>
        </div>

        <!-- Details -->
        <section class="ldet-card">
          <h2 class="ldet-card__title" data-i18n="leave.detailsHeading">Details</h2>
          <dl class="ldet-dl">
            <dt data-i18n="leave.fieldEmployee">Employee</dt>  <dd id="f-employee"></dd>
            <dt data-i18n="leave.fieldType">Type</dt>          <dd id="f-type"></dd>
            <dt data-i18n="leave.fieldWhen">When</dt>          <dd id="f-when" class="ldet-mono"></dd>
            <dt data-i18n="leave.fieldDuration">Duration</dt>  <dd id="f-duration"></dd>
            <dt data-i18n="leave.fieldRequested">Requested</dt><dd id="f-created" class="ldet-mono"></dd>
          </dl>
        </section>

        <!-- Reason -->
        <section class="ldet-card">
          <h2 class="ldet-card__title" data-i18n="leave.fieldReason">Reason</h2>
          <div id="f-reason" class="ldet-reason--empty"></div>
        </section>

        <!-- Attachment -->
        <section class="ldet-card" id="attachment-card" hidden>
          <h2 class="ldet-card__title" data-i18n="leave.fieldAttachment">Attachment</h2>
          <div id="f-attachment"></div>
          <div id="attachment-edit" class="attachment-edit" hidden>
            <label for="att-file" data-i18n="leave.attachmentChange">Add or replace file</label>
            <input type="file" id="att-file"
                   accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,application/pdf,image/jpeg,image/png,image/gif,image/webp">
            <div class="actions">
              <button type="button" id="att-upload" class="btn-ghost" data-i18n="leave.attachmentUpload">Upload</button>
              <button type="button" id="att-remove" class="btn-ghost" hidden data-i18n="leave.attachmentRemove">Remove</button>
            </div>
            <p class="subtle" data-i18n="leaveNew.attachmentHint">PDF or image, max 5 MB. Encrypted; visible only to you and your employer.</p>
          </div>
        </section>

        <!-- Decision note -->
        <section class="ldet-card ldet-decided" id="decided-note" hidden>
          <div class="ldet-decided__label" id="decided-label"></div>
          <div class="ldet-decided__notes" id="decided-notes"></div>
        </section>

        <!-- Actions -->
        <section class="ldet-card" id="actions-card" hidden>
          <h2 class="ldet-card__title" data-i18n="leave.actionsHeading">Actions</h2>
          <div class="ldet-actions" id="actions"></div>

          <div id="reject-dialog" class="reject-dialog" hidden>
            <label for="reject-notes" data-i18n="leave.rejectNotesEmployee">Notes for the employee (optional)</label>
            <textarea id="reject-notes" rows="3" maxlength="500"></textarea>
            <div class="actions">
              <button type="button" id="reject-cancel" class="btn-ghost" data-i18n="leave.cancelButton">Cancel</button>
              <button type="button" id="reject-confirm" class="btn-reject" data-i18n="leave.actionReject">Reject</button>
            </div>
          </div>
        </section>
      </div>

      <aside class="ldet-aside">
        <section class="ldet-card">
          <h2 class="ldet-card__title" data-i18n="leave.inCalendar">In the calendar</h2>
          <div id="mini-cal"></div>
        </section>
        <section class="ldet-card">
          <h2 class="ldet-card__title" data-i18n="leave.activity">Activity</h2>
          <div id="activity"></div>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="/leave.js"></script>
</body>
</html>
