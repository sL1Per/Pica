<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    // Defaults (no stored pref): slate palette, light mode.
    try {
      var root = document.documentElement;
      root.setAttribute('data-palette', 'slate'); // default; overridden below
      var m = localStorage.getItem('pica-color-mode') || 'light';
      var dark = m === 'dark' || (m === 'system' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette') || 'slate';
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default slate light */ }
  </script>
  <title data-i18n="title.reports">Pica — Reports</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/reports.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <h1 data-i18n="reports.title">Reports</h1>
      <p class="muted" data-i18n="reports.subtitle"></p>
    </header>

    <section class="rpt-controls" id="controls">
      <div class="chips" id="period-chips">
        <button type="button" class="chip" data-pt="day" data-i18n="reports.day">Day</button>
        <button type="button" class="chip active" data-pt="week" data-i18n="reports.week">Week</button>
        <button type="button" class="chip" data-pt="month" data-i18n="reports.month">Month</button>
        <button type="button" class="chip" data-pt="year" data-i18n="reports.year">Year</button>
      </div>
      <div class="rpt-nav">
        <button type="button" id="prev-period" class="btn-ghost" aria-label="Previous">◀</button>
        <span id="period-label"></span>
        <button type="button" id="next-period" class="btn-ghost" aria-label="Next">▶</button>
      </div>
      <div class="rpt-scope" id="scope-wrap" hidden>
        <select id="scope-select" aria-label="Filter by employee"></select>
      </div>
      <div class="rpt-actions">
        <a id="csv-link" class="btn-ghost btn-sm" data-i18n="reports.exportTimesheets">Timesheets CSV</a>
        <a id="csv-leaves-link" class="btn-ghost btn-sm" data-i18n="reports.exportLeaves">Leaves CSV</a>
        <button type="button" id="print-btn" class="btn-ghost btn-sm" data-i18n="reports.print">Print</button>
      </div>
    </section>

    <div id="result-error" class="message error" hidden></div>

    <section class="kpi-grid" id="kpi-grid"></section>

    <section class="rpt-charts">
      <div class="card"><h2 data-i18n="reports.chartBreaksTitle"></h2><div id="chart-breaks"></div></div>
      <div class="card"><h2 data-i18n="reports.chartLeaveTitle"></h2><div id="chart-leave"></div><div id="leave-legend" class="legend"></div></div>
    </section>

    <section class="card"><h2 data-i18n="reports.chartHoursTitle"></h2><div id="chart-hours"></div><div id="hours-legend" class="legend"></div></section>

    <section class="card"><h2 data-i18n="reports.byPerson"></h2><div id="people-table"></div></section>

    <section class="card" id="watchlist-card"><h2 data-i18n="reports.watchlistTitle"></h2>
      <p class="muted" data-i18n="reports.watchlistHint"></p><div id="watchlist"></div></section>

    <p id="result-empty" class="muted" data-i18n="reports.noData" hidden></p>
  </main>
  <script type="module" src="/reports.js"></script>
</body>
</html>
