<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.reports">Pica — Reports</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/reports.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header no-print">
      <div><h1 data-i18n="reports.title">Reports</h1></div>
    </header>

    <div class="printable-title" aria-hidden="true">
      <h1 data-i18n="reports.printTitle">Pica — Report</h1>
      <p id="print-meta"></p>
    </div>

    <div id="message" class="message no-print"></div>

    <section class="card no-print" id="controls">
      <div class="rpt-tabs">
        <button type="button" class="chip active" data-rt="timesheets" data-i18n="reports.typeTimesheets">Timesheets</button>
        <button type="button" class="chip" data-rt="leaves" data-i18n="reports.typeLeaves">Leaves</button>
      </div>

      <div class="rpt-scope" id="scope-wrap" hidden>
        <label data-i18n="reports.scope">Who</label>
        <div class="chips">
          <button type="button" class="chip active" data-scope="all" data-i18n="reports.scopeEveryone">Everyone</button>
          <button type="button" class="chip" data-scope="me" data-i18n="reports.scopePerson">One person</button>
        </div>
        <select id="employee-picker" hidden></select>
      </div>

      <div class="rpt-period">
        <div class="chips" id="period-chips">
          <button type="button" class="chip" data-pt="day" data-i18n="reports.periodDay">Day</button>
          <button type="button" class="chip" data-pt="week" data-i18n="reports.periodWeek">Week</button>
          <button type="button" class="chip active" data-pt="month" data-i18n="reports.periodMonth">Month</button>
          <button type="button" class="chip" data-pt="year" data-i18n="reports.periodYear">Year</button>
        </div>
        <div class="rpt-nav">
          <button type="button" id="prev-period" class="btn-ghost" aria-label="Previous">◀</button>
          <span id="period-label" class="rpt-label"></span>
          <button type="button" id="next-period" class="btn-ghost" aria-label="Next">▶</button>
        </div>
      </div>

      <div class="controls-actions">
        <button id="print-btn" type="button" class="secondary" data-i18n="reports.print">Print</button>
        <a id="csv-link" class="btn-link btn-link--secondary" href="#" download data-i18n="reports.downloadCSV">Download CSV</a>
      </div>
      <p class="subtle" data-i18n="reports.pdfHint">To save as PDF, use Print and choose "Save as PDF".</p>
    </section>

    <section class="card report-section" id="result">
      <div class="table-wrap" id="result-table-wrap"></div>
      <p id="result-empty" class="subtle center" hidden data-i18n="reports.empty">Nothing for this period.</p>
      <p id="result-error" class="subtle center no-print" hidden></p>
    </section>
  </main>
  <script type="module" src="/reports.js"></script>
</body>
</html>
