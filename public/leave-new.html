<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title data-i18n="title.leaveNew">Pica — Request leave</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/leave.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <h1 data-i18n="leaveNew.title">Request leave</h1>
        <p class="muted"><a href="/leaves" data-i18n="leaveNew.backToList">← Back to list</a></p>
      </div>
    </header>

    <form id="leave-form" class="card" autocomplete="off" novalidate>
      <label for="type" data-i18n="leaveNew.type">Type</label>
      <select id="type" name="type">
        <option value="vacation" selected data-i18n="leaves.type.vacation">Vacation</option>
        <option value="sick" data-i18n="leaves.type.sick">Sick leave</option>
        <option value="appointment" data-i18n="leaves.type.appointment">Appointment</option>
        <option value="other" data-i18n="leaves.type.other">Other</option>
      </select>

      <label data-i18n="leaveNew.unit">Unit</label>
      <div class="radio-row">
        <label class="radio"><input type="radio" name="unit" value="days" checked> <span data-i18n="leaveNew.unitDays">Full days</span></label>
        <label class="radio"><input type="radio" name="unit" value="hours"> <span data-i18n="leaveNew.unitHours">Hours</span></label>
      </div>

      <div id="days-fields">
        <label for="day-start" data-i18n="leaveNew.startDate">Start date</label>
        <input type="date" id="day-start" required>

        <label for="day-end" data-i18n="leaveNew.endDate">End date</label>
        <input type="date" id="day-end" required>
        <p class="subtle" data-i18n="leaveNew.endDateHint">Inclusive. For a single day, pick the same date twice.</p>
      </div>

      <div id="hours-fields" hidden>
        <label for="hour-date" data-i18n="leaveNew.date">Date</label>
        <input type="date" id="hour-date">

        <div class="time-row">
          <div>
            <label for="hour-start" data-i18n="leaveNew.from">From</label>
            <input type="time" id="hour-start">
          </div>
          <div>
            <label for="hour-end" data-i18n="leaveNew.to">To</label>
            <input type="time" id="hour-end">
          </div>
        </div>
      </div>

      <label for="reason" data-i18n="leaveNew.reason">Reason (optional)</label>
      <textarea id="reason" rows="3" maxlength="500" data-i18n-attr="placeholder:leaveNew.reasonPlaceholder" placeholder="Brief explanation. This field is encrypted."></textarea>

      <button id="submit-btn" type="submit" class="block" data-i18n="leaveNew.submit">Submit request</button>

      <div id="message" class="message"></div>
    </form>
  </main>

  <script type="module" src="/leave-new.js"></script>
</body>
</html>
