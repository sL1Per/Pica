<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.corrections">Pica — Time corrections</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/corrections.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 data-i18n="corrections.title">Time corrections</h1>
        <p class="subtle" id="page-subtitle" data-i18n="corrections.subtitleOwn">Manual entries you forgot to clock at the time.</p>
      </div>
      <div class="page-header__actions">
        <a href="/corrections/new" class="btn-primary" data-i18n="corrections.newButton">Register manual time</a>
      </div>
    </header>

    <div id="message" class="message"></div>

    <div class="corr-page">
      <section class="corr-section">
        <div class="corr-card corr-card--pending">
          <div class="corr-card__head">
            <h2 class="corr-card__title" id="list-heading" data-i18n="corrections.pendingHeading.own">Pending corrections</h2>
            <span class="corr-card__tag" id="pending-tag" hidden></span>
          </div>
          <ul id="pending-list" class="corr-list">
            <li class="subtle" data-i18n="employees.loading">Loading…</li>
          </ul>
        </div>
      </section>

      <section class="corr-section">
        <div class="corr-card">
          <div class="corr-card__head">
            <h2 class="corr-card__title" data-i18n="corrections.historyHeading">History</h2>
          </div>
          <ul id="history-list" class="corr-list">
            <li class="subtle" data-i18n="employees.loading">Loading…</li>
          </ul>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/corrections.js"></script>
</body>
</html>
