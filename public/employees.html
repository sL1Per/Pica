<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.employees">Pica — Employees</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/employees.css">
</head>
<body>
  <main class="container container--wide">
    <header class="tm-header">
      <div>
        <h1 class="tm-header__title" data-i18n="employees.title">Team</h1>
        <p class="tm-header__sub" id="tm-sub"></p>
      </div>
      <a href="/employees/new" class="tm-new" data-i18n="employeeNew.button">+ New employee</a>
    </header>

    <div id="message" class="message"></div>

    <div class="tm-toolbar">
      <div class="tm-search-wrap">
        <input type="search" id="tm-search" class="tm-search"
               data-i18n-attr="placeholder:team.searchPlaceholder" placeholder="Search by name or position…"
               autocomplete="off">
      </div>
      <div id="tm-chips" class="tm-chips"><!-- filter chips built in JS --></div>
    </div>

    <div class="tm-table">
      <div class="tm-thead">
        <span data-i18n="team.colPerson">Person</span>
        <span data-i18n="team.colStatus">Status now</span>
        <span data-i18n="team.colWeek">This week</span>
        <span data-i18n="team.colToday">Today</span>
        <span></span>
      </div>
      <div id="tm-tbody"></div>
    </div>

    <p id="tm-empty" class="tm-empty" hidden data-i18n="team.empty">No one matches.</p>

    <script type="module" src="/employees.js"></script>
  </main>
</body>
</html>
