<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title data-i18n="title.employeeNew">Pica — New employee</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/employee.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <h1 data-i18n="employeeNew.title">New employee</h1>
        <p class="muted"><a href="/employees" data-i18n="employeeNew.backToList">← Back to list</a></p>
      </div>
    </header>

    <form id="new-form" class="card" autocomplete="off" novalidate>
      <h2 data-i18n="employeeNew.account">Account</h2>
      <label for="username" data-i18n="employeeNew.username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="off" minlength="2" maxlength="64">

      <label for="password" data-i18n="employeeNew.initialPwd">Initial password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
      <p class="subtle" data-i18n="employeeNew.pwdShareHint">Share this with the employee. They can change it later (M11).</p>

      <label for="role" data-i18n="employeeNew.role">Role</label>
      <select id="role" name="role">
        <option value="employee" selected data-i18n="employee.role.employee">Employee</option>
        <option value="employer" data-i18n="employee.role.employer">Employer</option>
      </select>

      <h2 data-i18n="employeeNew.profile">Profile</h2>
      <label for="fullName" data-i18n="employeeNew.fullName">Full name</label>
      <input type="text" id="fullName" name="fullName">

      <label for="dateOfBirth" data-i18n="employeeNew.dob">Date of birth</label>
      <div class="dob-row">
        <input type="date" id="dateOfBirth" name="dateOfBirth">
        <span id="age-display" class="dob-age muted" hidden></span>
      </div>

      <label for="position" data-i18n="employeeNew.position">Position</label>
      <input type="text" id="position" name="position" data-i18n-attr="placeholder:employeeNew.positionPh" placeholder="e.g. Backend Developer">

      <label for="contactEmail" data-i18n="employeeNew.contactEmail">Contact email</label>
      <input type="email" id="contactEmail" name="contactEmail">

      <label for="contactPhone" data-i18n="employeeNew.contactPhone">Contact phone</label>
      <input type="text" id="contactPhone" name="contactPhone">

      <label for="address" data-i18n="employeeNew.address">Address</label>
      <input type="text" id="address" name="address">

      <label for="comments" data-i18n="employeeNew.comments">Comments</label>
      <textarea id="comments" name="comments" rows="3"></textarea>

      <button id="submit-btn" type="submit" class="block" data-i18n="employeeNew.submit">Create employee</button>

      <div id="message" class="message"></div>
    </form>
  </main>

  <script type="module" src="/employee-new.js"></script>
</body>
</html>
