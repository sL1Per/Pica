<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.employeeNew">Pica — New employee</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/employee-profile.css">
</head>
<body>
  <main class="prof-page container--wide">
    <a class="prof-back" href="/employees" data-i18n="employeeNew.backToList">← Back to list</a>

    <header class="prof-header">
      <h1 data-i18n="employeeNew.title">New employee</h1>
    </header>

    <form id="new-form" autocomplete="off" novalidate>
      <!-- Account -->
      <section class="prof-card">
        <h2 class="prof-card__label" data-i18n="employeeNew.account">Account</h2>
        <div class="prof-grid">
          <div class="prof-field">
            <label for="username" data-i18n="employeeNew.username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="off" minlength="2" maxlength="64">
          </div>
          <div class="prof-field">
            <label for="role" data-i18n="employeeNew.role">Role</label>
            <select id="role" name="role">
              <option value="employee" selected data-i18n="employee.role.employee">Employee</option>
              <option value="employer" data-i18n="employee.role.employer">Employer</option>
            </select>
          </div>
          <div class="prof-field">
            <label for="password" data-i18n="employeeNew.initialPwd">Initial password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            <span class="subtle" data-i18n="employeeNew.pwdShareHint">Share this with the employee. They can change it later from their Preferences.</span>
          </div>
        </div>
      </section>

      <!-- Identity -->
      <section class="prof-card">
        <h2 class="prof-card__label" data-i18n="employeeNew.cardIdentity">Identity</h2>
        <div class="prof-grid">
          <div class="prof-field">
            <label for="fullName" data-i18n="employeeNew.fullName">Full name</label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          <div class="prof-field">
            <label for="dateOfBirth" data-i18n="employeeNew.dob">Date of birth</label>
            <div class="dob-row">
              <input type="date" id="dateOfBirth" name="dateOfBirth" required>
              <span id="age-display" class="dob-age" hidden></span>
            </div>
          </div>
          <div class="prof-field">
            <label for="position" data-i18n="employeeNew.position">Position</label>
            <input type="text" id="position" name="position" required data-i18n-attr="placeholder:employeeNew.positionPh" placeholder="e.g. Backend Developer">
          </div>
          <div class="prof-field">
            <label for="address" data-i18n="employeeNew.address">Address</label>
            <input type="text" id="address" name="address" required>
          </div>
        </div>
      </section>

      <!-- Contact -->
      <section class="prof-card">
        <h2 class="prof-card__label" data-i18n="employeeNew.cardContact">Contact</h2>
        <div class="prof-grid">
          <div class="prof-field">
            <label for="contactEmail" data-i18n="employeeNew.contactEmail">Contact email</label>
            <input type="email" id="contactEmail" name="contactEmail" required>
          </div>
          <div class="prof-field">
            <label for="contactPhone" data-i18n="employeeNew.contactPhone">Contact phone</label>
            <input type="text" id="contactPhone" name="contactPhone" required>
          </div>
        </div>
      </section>

      <!-- Internal notes -->
      <section class="prof-card">
        <h2 class="prof-card__label" data-i18n="employeeNew.cardNotes">Internal notes</h2>
        <div class="prof-field">
          <textarea id="comments" name="comments" rows="3"></textarea>
        </div>
      </section>

      <div class="prof-actions">
        <div class="prof-actions__right">
          <a class="prof-btn-cancel" href="/employees" data-i18n="employee.cancel">Cancel</a>
          <button id="submit-btn" type="submit" class="prof-btn" data-i18n="employeeNew.submit">Create employee</button>
        </div>
      </div>
      <div id="message" class="message"></div>
    </form>
  </main>

  <script type="module" src="/employee-new.js"></script>
</body>
</html>
