<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme + palette bootstrap — runs synchronously before CSS to prevent FOUC.
    // Resolves color mode (light/dark/system) and palette (linen/slate/olive)
    // from localStorage onto <html> so app.css's token cascade picks the combo.
    try {
      var root = document.documentElement;
      var m = localStorage.getItem('pica-color-mode');
      var dark = m === 'dark' || (m !== 'light' && window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) { root.setAttribute('data-theme', 'dark'); }
      else { root.removeAttribute('data-theme'); }
      var p = localStorage.getItem('pica-palette');
      if (p === 'slate' || p === 'olive') { root.setAttribute('data-palette', p); }
      else { root.removeAttribute('data-palette'); }
    } catch (e) { /* storage/matchMedia blocked → default linen light */ }
  </script>
  <title data-i18n="title.settings">Pica — Settings</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/settings.css">
</head>
<body>
  <main class="container container--wide">
    <header class="set-head">
      <div>
        <h1 class="set-head__title" data-i18n="settings.title">Settings</h1>
        <p class="set-head__sub" data-i18n="settings.subtitle">Company-wide configuration. Only the employer sees this page.</p>
      </div>
    </header>

    <div id="message" class="message" hidden></div>

    <!-- Mobile chip row (shown ≤760px); tabs built in JS. -->
    <nav id="set-chips" class="set-chips" aria-label="Settings sections"></nav>

    <div class="set-layout">
      <aside id="set-tabs" class="set-tabs" aria-label="Settings sections"></aside>
      <div id="tab-content" class="set-content"></div>
    </div>
  </main>

  <script type="module" src="/settings.js"></script>
</body>
</html>
