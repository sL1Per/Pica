<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    // The persisted value is written by app.js after fetching /api/settings/me
    // and updated by preferences.js when the user saves a new choice.
    // Possible values: "light", "dark", "system" (or null on first visit).
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title>Pica — Preferences</title>
    <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/preferences.css">
</head>
<body>
  <main class="container container--wide">
    <header class="page-header">
      <div>
        <h1 id="page-title">Preferences</h1>
      </div>
    </header>

    <div id="message" class="message"></div>

    <section id="account" class="card">
      <p class="subtle" id="page-subtitle">These settings apply just to you.</p>

      <form id="prefs-form" autocomplete="off">
        <label for="locale" id="label-language">Language</label>
        <select id="locale" name="locale">
          <option value="en-US">English (US)</option>
          <option value="pt-PT">Português (PT)</option>
        </select>
        <p class="subtle" id="hint-language">The page will reload after saving so the new language takes effect everywhere.</p>

        <label id="label-colormode">Color mode</label>
        <div class="radio-row">
          <label class="radio"><input type="radio" name="colorMode" value="light"> <span id="label-light">Light</span></label>
          <label class="radio"><input type="radio" name="colorMode" value="dark"> <span id="label-dark">Dark</span></label>
          <label class="radio"><input type="radio" name="colorMode" value="system" checked> <span id="label-system">Follow system</span></label>
        </div>

        <button type="submit" class="block" id="save-btn">Save preferences</button>
      </form>
    </section>
  </main>

  <script type="module" src="/preferences.js"></script>
</body>
</html>
