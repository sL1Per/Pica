<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Theme bootstrap — runs synchronously before CSS to prevent FOUC.
    try {
      var m = localStorage.getItem('pica-color-mode');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (e) { /* localStorage blocked → fall back to system */ }
  </script>
  <title data-i18n="title.correctionDetail">Pica — Correction</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#2e7d32">
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/topbar.css">
  <link rel="stylesheet" href="/corrections.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <a id="back-link" class="back" href="/corrections" data-i18n="correction.backToList">← Back to corrections</a>
        <h1 id="page-title" data-i18n="correction.title">Correction</h1>
      </div>
    </header>

    <div id="message" class="message"></div>

    <section class="card">
      <dl class="kv">
        <dt data-i18n="correction.fieldStatus">Status</dt>
        <dd><span id="f-status" class="status-tag">—</span></dd>

        <dt data-i18n="correction.fieldEmployee">Employee</dt>
        <dd id="f-employee">—</dd>

        <dt data-row="start" data-i18n="correction.fieldStart">Start</dt>
        <dd id="f-start">—</dd>

        <dt data-row="end" data-i18n="correction.fieldEnd">End</dt>
        <dd id="f-end">—</dd>

        <dt data-row="hours" data-i18n="correction.fieldDuration">Duration</dt>
        <dd id="f-hours">—</dd>

        <dt data-i18n="correction.fieldJustification">Justification</dt>
        <dd id="f-justification" class="multiline">—</dd>

        <dt data-i18n="correction.fieldBankImpact">Bank impact</dt>
        <dd id="f-bank-impact">—</dd>

        <dt data-i18n="correction.fieldFiled">Filed</dt>
        <dd id="f-created">—</dd>

        <dt id="dt-decided" hidden data-i18n="correction.fieldDecision">Decision</dt>
        <dd id="f-decided" hidden>—</dd>

        <dt id="dt-notes" hidden data-i18n="correction.fieldNotes">Notes</dt>
        <dd id="f-notes" class="multiline" hidden>—</dd>
      </dl>

      <div id="actions" class="form-actions" hidden></div>
    </section>

    <dialog id="reject-dialog" class="reject-dialog">
      <form method="dialog">
        <h3 data-i18n="correction.rejectTitle">Reject correction</h3>
        <label for="reject-notes" data-i18n="correction.rejectNotes">Notes (optional)</label>
        <textarea id="reject-notes" rows="3" maxlength="500" data-i18n-attr="placeholder:correction.rejectPlaceholder" placeholder="Reason for rejection"></textarea>
        <div class="form-actions">
          <button id="reject-cancel" type="button" class="btn-ghost" data-i18n="correctionNew.cancel">Cancel</button>
          <button id="reject-confirm" type="button" class="btn-danger" data-i18n="correction.actionReject">Reject</button>
        </div>
      </form>
    </dialog>
  </main>

  <script type="module" src="/correction.js"></script>
</body>
</html>
