# Pica — nginx reverse proxy (Linux)
#
# For operators who already run nginx. Obtain a certificate with certbot
# (https://certbot.eff.org/) or your own CA, then fill in the paths below.
# Full walkthrough: docs/deployment.md.
#
# Pica listens on 127.0.0.1:8080 by default — keep it on loopback.

# Redirect plain HTTP to HTTPS.
server {
	listen 80;
	listen [::]:80;
	server_name pica.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name pica.example.com;

	# certbot writes these; adjust to your paths.
	ssl_certificate     /etc/letsencrypt/live/pica.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/pica.example.com/privkey.pem;

	# Pica caps request bodies at 5 MB; allow a little headroom for uploads.
	client_max_body_size 8m;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host              $host;
		proxy_set_header X-Real-IP         $remote_addr;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		# LOAD-BEARING: Pica sets the Secure cookie flag and emits HSTS only
		# when it sees X-Forwarded-Proto: https. Without this line, login
		# cookies ship without Secure and HSTS is never sent.
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
